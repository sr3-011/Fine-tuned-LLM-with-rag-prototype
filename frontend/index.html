<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enveda AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── CSS Custom Properties ─────────────────────────────── */
    :root {
      --bg-base:        #0a0c10;
      --bg-surface:     #10141c;
      --bg-raised:      #161b27;
      --bg-hover:       #1e2535;
      --border:         #1f2840;
      --border-light:   #2a3350;

      --accent-primary: #3d7fff;
      --accent-glow:    #1a4fd6;
      --accent-teal:    #00c9a7;
      --accent-amber:   #f5a623;

      --text-primary:   #e8edf7;
      --text-secondary: #8896b3;
      --text-muted:     #4a5568;

      --user-bubble-from: #2563eb;
      --user-bubble-to:   #1d4ed8;
      --bot-bubble:       #161b27;

      --radius-bubble: 18px;
      --radius-sm:      8px;
      --radius-md:     12px;
      --radius-lg:     20px;

      --shadow-sm:  0 2px 8px rgba(0,0,0,.35);
      --shadow-md:  0 4px 20px rgba(0,0,0,.5);
      --shadow-glow: 0 0 24px rgba(61,127,255,.18);

      --font-body: 'Sora', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --transition: 220ms cubic-bezier(.4,0,.2,1);
    }

    /* ─── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Background mesh ───────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 10%, rgba(61,127,255,.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 80%, rgba(0,201,167,.05) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Layout ────────────────────────────────────────────── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ─── Header ────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 28px;
      background: rgba(16,20,28,.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(255,255,255,.03), var(--shadow-sm);
      flex-shrink: 0;
    }

    .header-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-teal));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: var(--shadow-glow);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -.02em;
      color: var(--text-primary);
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: .01em;
    }

    .header-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--accent-teal);
      font-weight: 500;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-teal);
      box-shadow: 0 0 8px var(--accent-teal);
      animation: pulse-dot 2.4s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .55; transform: scale(.8); }
    }

    /* ─── Chat Area ─────────────────────────────────────────── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* Thin custom scrollbar */
    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb {
      background: var(--border-light);
      border-radius: 4px;
    }

    /* ─── Message Rows ──────────────────────────────────────── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp var(--transition) forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user  { flex-direction: row-reverse; }
    .msg-row.bot   { flex-direction: row; }

    /* ─── Avatars ────────────────────────────────────────────── */
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .avatar.user-av {
      background: linear-gradient(135deg, var(--user-bubble-from), var(--user-bubble-to));
      box-shadow: 0 0 12px rgba(61,127,255,.3);
    }

    .avatar.bot-av {
      background: linear-gradient(135deg, #1a2540, #0f1828);
      border: 1px solid var(--border-light);
    }

    /* ─── Bubble Wrapper ─────────────────────────────────────── */
    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 72%;
    }

    .msg-row.user .bubble-wrap { align-items: flex-end; }
    .msg-row.bot  .bubble-wrap { align-items: flex-start; }

    /* ─── Bubbles ────────────────────────────────────────────── */
    .bubble {
      padding: 13px 17px;
      border-radius: var(--radius-bubble);
      line-height: 1.65;
      font-size: 14.5px;
      word-break: break-word;
      box-shadow: var(--shadow-sm);
      position: relative;
    }

    .msg-row.user .bubble {
      background: linear-gradient(135deg, var(--user-bubble-from), var(--user-bubble-to));
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    .msg-row.bot .bubble {
      background: var(--bg-raised);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
    }

    /* ─── Timestamp ──────────────────────────────────────────── */
    .ts {
      font-size: 10.5px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
      font-variant-numeric: tabular-nums;
    }

    /* ─── Thinking / Typing Indicator ───────────────────────── */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: .18s; }
    .dot:nth-child(3) { animation-delay: .36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0);    opacity: .45; }
      40%           { transform: translateY(-7px);  opacity: 1;   }
    }

    /* ─── Welcome Banner ─────────────────────────────────────── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 40px 20px 10px;
      gap: 16px;
      animation: fadeUp .45s cubic-bezier(.4,0,.2,1) forwards;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-teal));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: var(--shadow-glow), 0 8px 32px rgba(0,0,0,.4);
    }

    #welcome h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -.025em;
    }

    #welcome p {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 420px;
      line-height: 1.7;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
    }

    .chip {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      background: var(--bg-raised);
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      font-family: var(--font-body);
    }

    .chip:hover {
      background: var(--bg-hover);
      border-color: var(--accent-primary);
      color: var(--accent-primary);
      transform: translateY(-1px);
    }

    /* ─── Input Bar ──────────────────────────────────────────── */
    #input-bar {
      padding: 16px 20px 20px;
      background: rgba(10,12,16,.9);
      backdrop-filter: blur(18px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-inner {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg-raised);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 10px 10px 10px 18px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .input-inner:focus-within {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(61,127,255,.12);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14.5px;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      min-height: 24px;
      overflow-y: auto;
    }

    #user-input::placeholder { color: var(--text-muted); }

    #user-input::-webkit-scrollbar { width: 3px; }
    #user-input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-glow));
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition);
      box-shadow: 0 2px 12px rgba(61,127,255,.35);
    }

    #send-btn:hover:not(:disabled) {
      transform: scale(1.06) translateY(-1px);
      box-shadow: 0 4px 18px rgba(61,127,255,.5);
    }

    #send-btn:active:not(:disabled) { transform: scale(.96); }

    #send-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #send-btn svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    .input-hint {
      text-align: right;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      padding-right: 4px;
    }

    /* ─── Error Bubble ───────────────────────────────────────── */
    .bubble.error {
      background: rgba(239,68,68,.08);
      border-color: rgba(239,68,68,.25);
      color: #fca5a5;
    }

    /* ─── History Panel ──────────────────────────────────────── */
    #history-panel {
      position: fixed;
      top: 0; right: 0;
      width: 300px;
      height: 100vh;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transform: translateX(100%);
      transition: transform 320ms cubic-bezier(.4,0,.2,1);
      box-shadow: -8px 0 32px rgba(0,0,0,.4);
    }
    #history-panel.open { transform: translateX(0); }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .history-header h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    #close-history {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color var(--transition), background var(--transition);
    }
    #close-history:hover { color: var(--text-primary); background: var(--bg-hover); }

    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #history-list::-webkit-scrollbar { width: 3px; }
    #history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .history-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      padding: 9px 10px;
      border-radius: 10px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      transition: background var(--transition);
    }
    .history-item:hover { background: var(--bg-hover); }

    .history-role {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      flex-shrink: 0;
      padding-top: 1px;
      width: 30px;
    }
    .history-role.user { color: var(--accent-primary); }
    .history-role.bot  { color: var(--accent-teal); }

    .history-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      word-break: break-word;
      flex: 1;
      /* clamp long messages in sidebar */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .history-ts {
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
      padding-top: 1px;
    }

    .history-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 32px 16px;
    }

    #history-count {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      flex-shrink: 0;
    }

    /* History toggle button in header */
    #history-btn {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-raised);
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all var(--transition);
    }
    #history-btn:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
      background: var(--bg-hover);
    }

    .hist-badge {
      background: var(--accent-primary);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      border-radius: 10px;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
      display: none;
    }
    .hist-badge.visible { display: inline-block; }

    #history-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 99;
    }
    #history-overlay.open { display: block; }

    /* ─── Responsive ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      #header { padding: 14px 16px; }
      #chat-area { padding: 20px 14px; }
      .bubble-wrap { max-width: 85%; }
      #input-bar { padding: 12px 12px 16px; }
      #history-panel { width: 85vw; }
    }
  </style>
</head>

<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────── -->
  <header id="header">
    <div class="header-logo">🧬</div>
    <div class="header-text">
      <h1>Enveda AI Assistant</h1>
      <p>AI-powered Drug Discovery Assistant</p>
    </div>
    <div class="header-status">
      <span class="status-dot"></span>
      <span>Online</span>
    </div>
    <button id="history-btn" aria-label="View chat history">
      🕘 History <span class="hist-badge" id="hist-badge">0</span>
    </button>
  </header>

  <!-- ── Chat Area ──────────────────────────────────────── -->
  <main id="chat-area">
    <!-- Welcome card injected by JS -->
  </main>

  <!-- ── Input Bar ──────────────────────────────────────── -->
  <footer id="input-bar">
    <div class="input-inner">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Ask about SAR analysis, drug pipelines, bottlenecks…"
        aria-label="Your message"
      ></textarea>
      <button id="send-btn" aria-label="Send message">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <p class="input-hint">Press <kbd style="font-family:var(--font-mono);font-size:10px;background:var(--bg-hover);padding:1px 5px;border-radius:4px;border:1px solid var(--border-light)">Enter</kbd> to send &nbsp;·&nbsp; <kbd style="font-family:var(--font-mono);font-size:10px;background:var(--bg-hover);padding:1px 5px;border-radius:4px;border:1px solid var(--border-light)">Shift+Enter</kbd> for new line</p>
  </footer>

</div>

<!-- ── History Overlay ────────────────────────────────── -->
<div id="history-overlay"></div>

<!-- ── History Panel (slide-in sidebar) ───────────────── -->
<aside id="history-panel" aria-label="Conversation history">
  <div class="history-header">
    <h3>Session History</h3>
    <button id="close-history" aria-label="Close history">✕</button>
  </div>
  <div id="history-list">
    <p class="history-empty">No messages yet.</p>
  </div>
  <div id="history-count">0 messages this session</div>
</aside>

<script>
  /* ═══════════════════════════════════════════════════════════
     Enveda AI Assistant  —  Chat Logic  (v3)
     History is the single source of truth.
     Every message is stored first, then rendered from state.
  ═══════════════════════════════════════════════════════════ */

  /* ── Config ─────────────────────────────────────────────── */
  const API_BASE = "https://fine-tuned-llm-with-rag-prototype.onrender.com/chat";
  // const API_BASE = "http://127.0.0.1:8000/chat";
  const TIMEOUT_MS  = 50000;   // 50 s per attempt
  const MAX_RETRIES = 1;        // auto-retry once on network failure

  /* ── DOM refs ───────────────────────────────────────────── */
  const chatArea      = document.getElementById('chat-area');
  const inputEl       = document.getElementById('user-input');
  const sendBtn       = document.getElementById('send-btn');
  const historyBtn    = document.getElementById('history-btn');
  const historyPanel  = document.getElementById('history-panel');
  const historyList   = document.getElementById('history-list');
  const historyCount  = document.getElementById('history-count');
  const histBadge     = document.getElementById('hist-badge');
  const closeHistory  = document.getElementById('close-history');
  const histOverlay   = document.getElementById('history-overlay');

  /* ── App state ──────────────────────────────────────────── */
  let isLoading   = false;
  let thinkingRow = null;   // DOM node of the animated typing row

  /**
   * chatHistory  —  SINGLE SOURCE OF TRUTH
   * Every real message (user + bot) lives here.
   * Shape: { id, role: 'user'|'bot', text, ts, isError }
   */
  const chatHistory = [];
  let msgIdCounter  = 0;

  /* ── Quick-start chips ──────────────────────────────────── */
  const CHIPS = [
    'What is SAR analysis?',
    'Explain the drug discovery pipeline',
    'What are common drug bottlenecks?',
    'How does RAG help in drug research?',
  ];

  /* ══════════════════════════════════════════════════════════
     UTILITIES
  ══════════════════════════════════════════════════════════ */

  function nowTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHTML(str) {
    const map = { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' };
    return String(str).replace(/[&<>"']/g, c => map[c]);
  }

  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  }

  function scrollToBottom() {
    chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
  }

  function setLoading(state) {
    isLoading          = state;
    sendBtn.disabled   = state;
    inputEl.disabled   = state;
    if (!state) inputEl.focus();
  }

  /* ══════════════════════════════════════════════════════════
     HISTORY  —  state management + sidebar rendering
  ══════════════════════════════════════════════════════════ */

  /**
   * Add a message to chatHistory and return the new entry.
   * This is the only place messages are created.
   */
  function addToHistory(role, text, isError = false) {
    const entry = {
      id: ++msgIdCounter,
      role,
      text,
      ts: nowTime(),
      isError,
    };
    chatHistory.push(entry);
    refreshHistoryPanel();   // keep sidebar in sync immediately
    return entry;
  }

  /**
   * Re-render the history sidebar from chatHistory state.
   * Called every time a message is added or resolved.
   */
  function refreshHistoryPanel() {
    const count = chatHistory.length;

    // Update badge
    histBadge.textContent = count;
    histBadge.classList.toggle('visible', count > 0);

    // Update footer count
    historyCount.textContent = `${count} message${count !== 1 ? 's' : ''} this session`;

    // Rebuild list
    if (count === 0) {
      historyList.innerHTML = '<p class="history-empty">No messages yet.</p>';
      return;
    }

    historyList.innerHTML = '';
    chatHistory.forEach(entry => {
      const item = document.createElement('div');
      item.classList.add('history-item');

      const roleEl = document.createElement('span');
      roleEl.classList.add('history-role', entry.role);
      roleEl.textContent = entry.role === 'user' ? 'You' : 'Bot';

      const textEl = document.createElement('span');
      textEl.classList.add('history-text');
      textEl.textContent = entry.text;   // plain text, no HTML needed here

      const tsEl = document.createElement('span');
      tsEl.classList.add('history-ts');
      tsEl.textContent = entry.ts;

      item.appendChild(roleEl);
      item.appendChild(textEl);
      item.appendChild(tsEl);
      historyList.appendChild(item);
    });

    // Auto-scroll sidebar to bottom
    historyList.scrollTop = historyList.scrollHeight;
  }

  /* ══════════════════════════════════════════════════════════
     HISTORY PANEL  —  open / close
  ══════════════════════════════════════════════════════════ */

  function openHistoryPanel() {
    historyPanel.classList.add('open');
    histOverlay.classList.add('open');
  }

  function closeHistoryPanel() {
    historyPanel.classList.remove('open');
    histOverlay.classList.remove('open');
  }

  historyBtn.addEventListener('click', openHistoryPanel);
  closeHistory.addEventListener('click', closeHistoryPanel);
  histOverlay.addEventListener('click', closeHistoryPanel);

  /* ══════════════════════════════════════════════════════════
     DOM BUILDERS  —  chat bubble rows
  ══════════════════════════════════════════════════════════ */

  /**
   * Build a chat bubble row from a history entry or a typing indicator.
   * @param {'user'|'bot'} role
   * @param {string}       text
   * @param {boolean}      isTyping
   * @param {boolean}      isError
   * @param {string}       ts
   */
  function buildRow(role, text, isTyping = false, isError = false, ts = nowTime()) {
    const row = document.createElement('div');
    row.classList.add('msg-row', role);

    const avatar = document.createElement('div');
    avatar.classList.add('avatar', role === 'user' ? 'user-av' : 'bot-av');
    avatar.textContent = role === 'user' ? '👤' : '🧬';

    const wrap = document.createElement('div');
    wrap.classList.add('bubble-wrap');

    const bubble = document.createElement('div');
    bubble.classList.add('bubble');
    if (isError) bubble.classList.add('error');

    if (isTyping) {
      bubble.classList.add('typing-bubble');
      bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    } else {
      bubble.innerHTML = escapeHTML(text).replace(/\n/g, '<br>');
    }

    const tsEl = document.createElement('div');
    tsEl.classList.add('ts');
    tsEl.textContent = ts;

    wrap.appendChild(bubble);
    wrap.appendChild(tsEl);
    row.appendChild(avatar);
    row.appendChild(wrap);

    return row;
  }

  /**
   * Render a single history entry as a chat bubble and append it.
   * Used for the initial render and when replaying history.
   */
  function renderEntry(entry) {
    const row = buildRow(entry.role, entry.text, false, entry.isError, entry.ts);
    chatArea.appendChild(row);
  }

  /**
   * Full re-render of the chat area from chatHistory.
   * Clears DOM and repaints every message. Used if needed.
   */
  function rerenderChat() {
    // Remove all message rows (keep welcome if present)
    chatArea.querySelectorAll('.msg-row').forEach(r => r.remove());
    chatHistory.forEach(renderEntry);
    scrollToBottom();
  }

  /* ══════════════════════════════════════════════════════════
     API LAYER  —  timeout + retry
  ══════════════════════════════════════════════════════════ */

  async function fetchWithTimeout(url, options, ms) {
    const ctrl  = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), ms);
    try {
      return await fetch(url, { ...options, signal: ctrl.signal });
    } catch (err) {
      if (err.name === 'AbortError') {
        throw new Error('Request timed out (10 s). The server took too long — please retry.');
      }
      throw new Error('Backend unreachable. Please check your server or ngrok tunnel.');
    } finally {
      clearTimeout(timer);
    }
  }

  async function fetchAnswer(query, attempt = 0) {
    const url = `${API_BASE}?q=${encodeURIComponent(query)}`;

    let response;
    try {
      response = await fetchWithTimeout(
        url,
        {
          method : 'GET',
          headers: { 'ngrok-skip-browser-warning': 'true', 'Accept': 'application/json' },
          mode   : 'cors',
        },
        TIMEOUT_MS,
      );
    } catch (networkErr) {
      if (attempt < MAX_RETRIES) {
        console.warn(`[Enveda] Attempt ${attempt + 1} failed — retrying…`);
        return fetchAnswer(query, attempt + 1);
      }
      throw networkErr;
    }

    // Always read text first — never call .json() blind
    const raw = await response.text();

    // ngrok HTML warning page detection
    if (raw.trimStart().startsWith('<')) {
      throw new Error(
        'Got an HTML page instead of JSON — ngrok intercepted the request. ' +
        'Open the ngrok URL in your browser, click "Visit Site", then retry.'
      );
    }

    // HTTP errors
    if (!response.ok) {
      if (response.status >= 500) throw new Error(`Server error (${response.status}). The backend may be down.`);
      throw new Error(`Request failed with HTTP ${response.status}.`);
    }

    // Safe JSON parse
    let data;
    try {
      data = JSON.parse(raw);
    } catch {
      console.error('[Enveda] JSON parse failed. Raw:', raw);
      throw new Error('Server returned an unexpected response format. Check the console.');
    }

    // Support multiple response key names
    const text = data?.response ?? data?.answer ?? data?.message ?? data?.text ?? '';
    if (!String(text).trim()) {
      throw new Error('Server returned an empty response. Please try again.');
    }

    return String(text).trim();
  }

  /* ══════════════════════════════════════════════════════════
     SEND HANDLER  —  main flow
  ══════════════════════════════════════════════════════════ */

  async function handleSend() {
    const query = inputEl.value.trim();
    if (!query || isLoading) return;

    // Remove welcome screen on first real message
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    // Lock UI & clear input
    setLoading(true);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // 1. Save user message to history → render it
    const userEntry = addToHistory('user', query);
    renderEntry(userEntry);
    scrollToBottom();

    // 2. Show animated typing indicator (NOT saved to history yet)
    thinkingRow = buildRow('bot', '', true);
    chatArea.appendChild(thinkingRow);
    scrollToBottom();

    // 3. Fetch answer
    try {
      const answer = await fetchAnswer(query);

      // Remove typing indicator from DOM
      thinkingRow.remove();
      thinkingRow = null;

      // Save bot response to history → render it
      const botEntry = addToHistory('bot', answer, false);
      renderEntry(botEntry);
      scrollToBottom();

    } catch (err) {
      console.error('[Enveda] Error:', err);

      // Remove typing indicator
      if (thinkingRow) { thinkingRow.remove(); thinkingRow = null; }

      // Save error response to history → render it
      const errMsg = err.message || 'Something went wrong. Please try again.';
      const errEntry = addToHistory('bot', errMsg, true);
      renderEntry(errEntry);
      scrollToBottom();
    } finally {
      setLoading(false);
    }
  }

  /* ══════════════════════════════════════════════════════════
     WELCOME SCREEN
  ══════════════════════════════════════════════════════════ */

  function renderWelcome() {
    const div = document.createElement('div');
    div.id = 'welcome';
    div.innerHTML = `
      <div class="welcome-icon">🧬</div>
      <h2>Welcome to Enveda AI</h2>
      <p>Ask me anything about drug discovery — SAR analysis, pipeline strategies,
         target identification, ADMET properties, and more.</p>
      <div class="chip-row">
        ${CHIPS.map(c => `<button class="chip">${escapeHTML(c)}</button>`).join('')}
      </div>
    `;
    div.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        if (isLoading) return;
        inputEl.value = chip.textContent.trim();
        autoResize();
        handleSend();
      });
    });
    chatArea.appendChild(div);
  }

  /* ══════════════════════════════════════════════════════════
     EVENT LISTENERS
  ══════════════════════════════════════════════════════════ */

  sendBtn.addEventListener('click', handleSend);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  inputEl.addEventListener('input', autoResize);

  /* ══════════════════════════════════════════════════════════
     INIT
  ══════════════════════════════════════════════════════════ */

  renderWelcome();
  refreshHistoryPanel();   // initialise sidebar with empty state
  inputEl.focus();
</script>
</body>
</html>
